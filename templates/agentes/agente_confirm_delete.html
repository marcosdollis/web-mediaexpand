{% extends "base/base.html" %}
{% block title %}Excluir Agente{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px">
  <div class="card border-0 shadow">
    <div class="card-body text-center py-5 px-4">
      <i class="fas fa-exclamation-triangle text-danger fs-1 mb-3 d-block"></i>
      <h5 class="fw-bold mb-2">Excluir "{{ agente.nome }}"?</h5>
      <p class="text-muted">Todas as conversas e mensagens deste agente serão <strong>permanentemente removidas</strong>.</p>
      <div class="d-flex gap-3 justify-content-center mt-4">
        <a href="{% url 'agente_list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="fas fa-trash me-1"></i>Excluir
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
